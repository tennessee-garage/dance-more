; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Base filter: include everything, exclude ALL main_*.cpp entry points.
; Each named environment appends only its own entry point via ${env.build_src_filter}.
; Adding a new main_foo.cpp test harness requires no changes to other environments.
[env]
build_src_filter = +<*> -<main*.cpp>

[env:ATtiny3224]
platform = atmelmegaavr
board = ATtiny3224
framework = arduino
upload_protocol = serialupdi
board_build.f_cpu = 20000000L
lib_deps = https://github.com/SpenceKonde/tinyNeoPixel.git
build_src_filter = ${env.build_src_filter} +<main.cpp> -<native/> -<esp32/>

[env:ATtiny3224_led_test]
platform = atmelmegaavr
board = ATtiny3224
framework = arduino
upload_protocol = serialupdi
board_build.f_cpu = 20000000L
lib_deps = https://github.com/SpenceKonde/tinyNeoPixel.git
build_src_filter = -<*> +<main_led_test.cpp>

[env:native]
platform = native
build_flags = -DNATIVE -std=c++17 -Isrc
build_src_filter = ${env.build_src_filter} +<main_native.cpp> -<at/> -<esp32/>

[env:test_native]
platform = native
build_flags = -DNATIVE -std=c++17 -Isrc
build_src_filter = ${env.build_src_filter} -<at/> -<esp32/>

[env:esp32c3]
platform  = espressif32
board     = seeed_xiao_esp32c3
framework = arduino
build_src_filter = ${env.build_src_filter} +<main_esp32.cpp> -<at/> -<native/>
