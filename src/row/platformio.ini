; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Base filter: include everything, exclude ALL main_*.cpp entry points
; (top-level or nested under a platform dir, e.g. rp2350/main_led_test.cpp).
; Each named environment appends only its own entry point via ${env.build_src_filter}.
[env]
build_src_filter = +<*> -<**/main*.cpp>
; tile_bus_protocol/ is shared with src/tile/DF2-Tile/ (both sides of the same
; wire protocol) - see src/common/tile_bus_protocol/.
lib_extra_dirs = ../common

[env:seeed_xiao_rp2350]
platform  = https://github.com/Seeed-Studio/platform-seeedboards.git
board     = seeed-xiao-rp2350
framework = arduino
build_src_filter = ${env.build_src_filter} +<main.cpp> -<native/>

[env:native]
platform = native
build_flags = -DNATIVE -std=c++17 -Isrc
build_src_filter = ${env.build_src_filter} +<main_native.cpp> -<rp2350/>

[env:seeed_xiao_rp2350_led_test]
platform  = https://github.com/Seeed-Studio/platform-seeedboards.git
board     = seeed-xiao-rp2350
framework = arduino
build_src_filter = -<*> +<hw_tests/main_led_test.cpp> +<rp2350/status_led_rp2350.cpp>

[env:seeed_xiao_rp2350_power_test]
platform  = https://github.com/Seeed-Studio/platform-seeedboards.git
board     = seeed-xiao-rp2350
framework = arduino
build_src_filter = -<*> +<hw_tests/main_power_test.cpp> +<rp2350/power_monitor_rp2350.cpp>

[env:seeed_xiao_rp2350_sense_test]
platform  = https://github.com/Seeed-Studio/platform-seeedboards.git
board     = seeed-xiao-rp2350
framework = arduino
build_src_filter = -<*> +<hw_tests/main_sense_test.cpp> +<rp2350/tile_transport_rp2350.cpp> +<rp2350/row_sense_rp2350.cpp>

[env:seeed_xiao_rp2350_row_test]
platform  = https://github.com/Seeed-Studio/platform-seeedboards.git
board     = seeed-xiao-rp2350
framework = arduino
build_src_filter = -<*> +<hw_tests/main_row_test.cpp> +<rp2350/tile_transport_rp2350.cpp> +<rp2350/row_sense_rp2350.cpp>
